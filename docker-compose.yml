services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: gustech
      MYSQL_DATABASE: gustech
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pgustech"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: npm run dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8080
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: gustech
      MYSQL_USER: root
      MYSQL_PASSWORD: gustech
      MYSQL_CONNECTION_LIMIT: 10
      CORS_ORIGIN: http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mysql_data:
