      <rect x="-30" y="394" width="30" height="34" rx="8"/>
      <rect x="500" y="58" width="30" height="34" rx="8"/>
      <rect x="500" y="142" width="30" height="34" rx="8"/>
      <rect x="500" y="226" width="30" height="34" rx="8"/>
