<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus pedidos | GusTech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oxanium:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Oxanium', 'sans-serif'] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/storefront.css">
  <script src="js/theme.js"></script>
</head>
<body class="store-shell text-slate-100 antialiased">
  <div id="toast-root" class="fixed top-24 right-4 z-50 flex flex-col gap-3"></div>

  <header class="sticky top-0 z-40 border-b border-white/5 bg-slate-950/70 backdrop-blur-xl">
    <div class="page-container page-header py-4">
      <div class="page-header__left">
        <a href="index.html" class="secondary-btn"><i class="fas fa-arrow-left"></i>Voltar a pagina</a>
      </div>
      <div class="page-header__center">
        <a href="index.html" class="text-3xl font-display font-bold tracking-wide">GUS<span class="text-blue-400">TECH</span></a>
      </div>
      <div class="page-header__right">
        <div data-theme-slot></div>
        <a href="carrinho.html" class="secondary-btn"><i class="fas fa-bag-shopping"></i>Carrinho</a>
      </div>
    </div>
  </header>

  <main class="page-container py-8 space-y-8">
    <section class="surface-panel rounded-[32px] p-6 md:p-8">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <div class="mini-meta uppercase tracking-[0.22em]">Minha conta</div>
          <h1 class="text-4xl font-display font-bold mt-2">Meus pedidos</h1>
          <p class="text-slate-400 mt-3">Acompanhe status, itens, valores e historico dos seus pedidos em um so lugar.</p>
        </div>
        <a href="conta.html" class="secondary-btn"><i class="fas fa-user"></i>Minha conta</a>
      </div>
    </section>

    <section class="surface-panel rounded-[32px] p-6 md:p-8">
      <div id="orders-list" class="space-y-4"></div>
      <p id="feedback" class="text-sm hidden"></p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/api.js"></script>
  <script type="module" src="js/pedidos-page.js"></script>
</body>
</html>
