<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Produtos favoritos da sua conta GusTech.">
  <title>Favoritos | GusTech</title>
  <link rel="icon" type="image/png" href="images/gustech-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oxanium:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Oxanium', 'sans-serif'] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/storefront.css">
  <script src="js/theme.js"></script>
</head>
<body class="store-shell text-slate-100 antialiased">
  <div id="toast-root" class="fixed top-24 right-4 z-50 flex flex-col gap-3"></div>

  <header class="sticky top-0 z-40 border-b border-white/5 bg-slate-950/70 backdrop-blur-xl">
    <div class="page-container page-header py-2.5">
      <div class="page-header__left">
        <a href="index.html" class="secondary-btn store-icon-btn" aria-label="Voltar para a pagina inicial"><i class="fas fa-arrow-left"></i></a>
      </div>
      <div class="page-header__center">
        <a href="index.html" class="store-brand store-brand--compact" aria-label="GusTech"><img class="store-brand__logo" src="images/gustech-logo.png" alt="" width="36" height="36"><span class="store-brand__wordmark">GUS <span>TECH</span></span></a>
      </div>
      <div class="page-header__right">
        <div data-theme-slot></div>
        <a href="favoritos.html" class="secondary-btn store-icon-btn" aria-label="Favoritos"><i class="fas fa-heart text-red-300"></i></a>
        <a href="carrinho.html" class="secondary-btn store-icon-btn relative" aria-label="Carrinho"><i class="fas fa-bag-shopping"></i><span id="cart-badge" class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-blue-500 text-[11px] text-white flex items-center justify-center scale-0">0</span></a>
      </div>
    </div>
  </header>

  <main class="page-container py-8 space-y-8">
    <section class="surface-panel rounded-[32px] p-6 md:p-8">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <div class="mini-meta uppercase tracking-[0.22em]">Sua lista</div>
          <h1 class="text-4xl font-display font-bold mt-2">Favoritos</h1>
          <p id="favorites-subtitle" class="text-slate-400 mt-3">Produtos salvos para comparar, comprar depois ou voltar rapidinho.</p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <a href="index.html#catalog-section" class="secondary-btn"><i class="fas fa-store"></i>Explorar loja</a>
          <a href="carrinho.html" class="primary-btn"><i class="fas fa-bag-shopping"></i>Ir ao carrinho</a>
        </div>
      </div>
    </section>

    <section id="favorites-content" class="surface-panel rounded-[32px] p-6 md:p-8">
      <div id="favorites-list" class="product-grid product-grid--compact"></div>
      <p id="favorites-feedback" class="mt-5 text-sm hidden" role="alert"></p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/api.js"></script>
  <script type="module" src="js/favorites-page.js"></script>
  <script src="js/login-guard.js"></script>
</body>
</html>
