<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido confirmado | GusTech</title>
  <link rel="icon" type="image/png" href="images/gustech-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oxanium:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Oxanium', 'sans-serif'] }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/storefront.css">
  <script src="js/theme.js"></script>
</head>
<body class="store-shell text-slate-100 antialiased">
  <header class="sticky top-0 z-40 border-b border-white/5 bg-slate-950/70 backdrop-blur-xl">
    <div class="page-container page-header py-2.5">
      <div class="page-header__left">
        <a href="index.html" class="secondary-btn store-icon-btn" aria-label="Voltar para a pagina inicial"><i class="fas fa-arrow-left"></i></a>
      </div>
      <div class="page-header__center">
        <a href="index.html" class="store-brand store-brand--compact" aria-label="GusTech"><img class="store-brand__logo" src="images/gustech-logo.png" alt="" width="36" height="36"><span class="store-brand__wordmark">GUS <span>TECH</span></span></a>
      </div>
      <div class="page-header__right">
        <div data-theme-slot></div>
        <a href="favoritos.html" class="secondary-btn store-icon-btn" aria-label="Favoritos"><i class="fas fa-heart"></i></a>
        <a href="carrinho.html" class="secondary-btn store-icon-btn relative" aria-label="Carrinho"><i class="fas fa-bag-shopping"></i><span id="cart-badge" class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-blue-500 text-[11px] text-white flex items-center justify-center scale-0">0</span></a>
      </div>
    </div>
  </header>

  <main class="page-container py-12">
    <section class="surface-panel rounded-[36px] p-8 md:p-12 text-center max-w-3xl mx-auto">
      <div class="w-20 h-20 rounded-full bg-emerald-500/15 text-emerald-300 grid place-items-center mx-auto border border-emerald-500/20">
        <i class="fas fa-check text-3xl"></i>
      </div>
      <div class="mini-meta uppercase tracking-[0.22em] mt-6">Pedido registrado</div>
      <h1 class="mt-3 text-5xl font-display font-bold">Obrigado por comprar na GusTech</h1>
      <p class="mt-5 text-lg text-slate-400">Seu pedido foi criado com sucesso. Agora voce pode acompanhar o status, revisar os itens e seguir comprando com mais tranquilidade.</p>
      <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
        <a href="conta.html?focus=orders" class="primary-btn"><i class="fas fa-box"></i>Ver meus pedidos</a>
        <a href="index.html" class="secondary-btn"><i class="fas fa-store"></i>Voltar para a loja</a>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script>
    (() => {
      const badge = document.getElementById('cart-badge');
      if (!badge) return;
      badge.textContent = '0';
      badge.style.display = 'none';
      badge.classList.add('scale-0');
    })();
  </script>
  <script src="js/login-guard.js"></script>
</body>
</html>
